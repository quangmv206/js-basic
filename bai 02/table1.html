<head>

<body>
    <style>
        table,
        th,
        td{
            border: 1px solid
        }
            th,
            td {
                pading:10x
            }
    </style>



    <table>

            </tr>
            <tr>

            </tr>
            <tr>

                <td>hàng 4 cột 5</td>
            </tr>
            <tr>

                <td rowspan="2">hàng 5 cột 3</td>
                <td>hàng 5 cột 4</td>

            <tr>

        </tbody>
