<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài 6 - Đồng hồ</title>
</head>
<body>

    <h2>Đồng hồ hiện tại:</h2>
    <div id="div1" style="font-size: 24px; font-weight: bold; color: blue;"></div>

    <script>
        // Viết hàm showDateTime
        function showDateTime() {
            let now = new Date(); // Lấy thời gian hiện tại

            // Lấy ngày, tháng, năm (padStart giúp thêm số 0 đằng trước nếu nhỏ hơn 10)
            let day = String(now.getDate()).padStart(2, '0');
            let month = String(now.getMonth() + 1).padStart(2, '0'); 
            let year = now.getFullYear();

            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let seconds = String(now.getSeconds()).padStart(2, '0');

            let timeString = `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;

  
            document.getElementById("div1").innerText = timeString;
        }

        showDateTime();

   
        setInterval(showDateTime, 1000);
    </script>

</body>
</html>
</body>
</html>
